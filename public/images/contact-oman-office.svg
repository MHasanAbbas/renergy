<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e7b7c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a2d4a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#0d1620"/>
  <rect width="1200" height="800" fill="url(#gradient)"/>
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
  </g>
</svg>