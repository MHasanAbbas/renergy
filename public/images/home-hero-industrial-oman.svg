<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="industrialGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1620;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#industrialGrad)"/>
  <!-- Industrial pipes and equipment silhouettes -->
  <circle cx="200" cy="300" r="80" fill="#1e7b7c" opacity="0.6"/>
  <circle cx="600" cy="200" r="120" fill="#1e7b7c" opacity="0.4"/>
  <circle cx="1000" cy="400" r="100" fill="#1e7b7c" opacity="0.5"/>
  <rect x="100" y="500" width="300" height="200" fill="#1e7b7c" opacity="0.3"/>
  <rect x="800" y="550" width="250" height="150" fill="#1e7b7c" opacity="0.35"/>
  <!-- Technical grid pattern -->
  <g stroke="#1e7b7c" stroke-width="1" opacity="0.2">
    <line x1="0" y1="0" x2="1200" y2="800"/>
    <line x1="1200" y1="0" x2="0" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>
  <!-- Text overlay -->
  <text x="600" y="750" font-size="32" fill="#f5f5f5" text-anchor="middle" font-family="Arial">Industrial Engineering Excellence</text>
</svg>