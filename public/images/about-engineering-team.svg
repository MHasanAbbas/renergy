<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d4a6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d4a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background gradient -->
  <rect width="1200" height="800" fill="url(#grad1)"/>
  <!-- Abstract industrial shapes -->
  <g opacity="0.15">
    <rect x="50" y="100" width="300" height="300" fill="#1e7b7c" transform="rotate(25 200 250)"/>
    <circle cx="900" cy="150" r="150" fill="#1e7b7c"/>
    <rect x="650" y="450" width="400" height="200" fill="#1e7b7c"/>
  </g>
  <!-- Accent elements -->
  <g stroke="#1e7b7c" stroke-width="3" fill="none" opacity="0.4">
    <line x1="100" y1="700" x2="1100" y2="700"/>
    <line x1="100" y1="100" x2="1100" y2="100"/>
  </g>
  <!-- Geometric accent -->
  <g fill="#1e7b7c" opacity="0.3">
    <polygon points="50,600 150,650 50,700" />
    <polygon points="1100,100 1150,150 1100,200" />
  </g>
</svg>